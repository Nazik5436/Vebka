<!DOCTYPE html>
<html>
<head>
    <title>Завдання 2 - Цитати</title>
    <meta charset="utf-8">
</head>
<body>
    <h2>Про Батьківщину та патріотизм. Про рідну мову, українську пісню</h2>
    
    <script type="text/javascript">
        function showQuote(text) {
            alert(text);
        }
    </script>

    <button onclick="showQuote('Де немає свободи, там немає і вітчизни.')">П. Гольбах</button>
    <button onclick="showQuote('В своїй хаті своя й правда, І сила, і воля.')">Т. Шевченко</button>
    <button onclick="showQuote('Вітчизна – ось і альфа, і омега!')">Д. Павличко</button>
    <button onclick="showQuote('Нації вмирають не від інфаркту. Спочатку їм відбирає мову.')">Л. Костенко</button>
    <button onclick="showQuote('Нема на світі України, немає другого Дніпра.')">Т. Шевченко</button>
</body>
</html>
