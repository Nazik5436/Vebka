<!DOCTYPE html>
<html>
<head>
    <title>Завдання 3 - Math (Варіант 15)</title>
    <meta charset="utf-8">
</head>
<body>
<script type="text/javascript">
    document.write("<h3>КОНСТАНТИ</h3>");
    document.write("1. Значення константи e = " + Math.E + "<br>");
    document.write("2. Значення константи π = " + Math.PI + "<br>");
    document.write("3. Десятковий логарифм постійної Ейлера (e) = " + Math.LOG10E + "<br>");
    document.write("4. Двійковий логарифм постійної Ейлера (e) = " + Math.LOG2E + "<br>");
    document.write("5. Натуральний логарифм числа 10 = " + Math.LN10 + "<br>");
    document.write("6. Натуральний логарифм числа 2 = " + Math.LN2 + "<br>");
    document.write("7. Корінь квадратний із двох = " + Math.SQRT2 + "<br>");
    document.write("8. Корінь квадратний з однієї другої = " + Math.SQRT1_2 + "<br>");

    document.write("<h3>ФУНКЦІЇ (Для варіанта 15)</h3>");
    document.write("15. Результат обчислення десяткового логарифма від числа 100: y = " + Math.log10(100) + "<br>");
    document.write("16. Результат обчислення двійкового логарифма від числа 8: y = " + Math.log2(8) + "<br>");
    document.write("17. Тангенс 45 градусів (з округленням): y = " + Math.round(Math.tan(Math.PI/4)) + "<br>");
    document.write("18. Результат округлення числа 1.00123 у більшу сторону: y = " + Math.ceil(1.00123) + "<br>");
    document.write("19. Результат округлення числа -3.1234 у більшу сторону: y = " + Math.ceil(-3.1234) + "<br>");

    document.write("<h3>ГЕНЕРАТОР ВИПАДКОВИХ ЧИСЕЛ</h3>");
    document.write("Формування випадкових чисел в інтервалі [0;1]: y = " + Math.random() + "<br>");
</script>
</body>
</html>
