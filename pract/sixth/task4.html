<html>
<head>
    <title>Завдання 4 - Реєстрація</title>
</head>
<body>
    <h2>Форма реєстрації нового користувача</h2>
    <form method="post" action="zaglushka.html">
        <table border="0" cellpadding="5">
            <tr>
                <td>Логін:</td>
                <td><input type="text" name="login" size="20"></td>
            </tr>
            <tr>
                <td>Пароль:</td>
                <td><input type="password" name="pass" size="20"></td>
            </tr>
            <tr>
                <td>Повне ім'я:</td>
                <td><input type="text" name="fullname" size="30"></td>
            </tr>
            <tr>
                <td>Стать:</td>
                <td>
                    <input type="radio" name="gender" value="male" checked> Чоловіча
                    <input type="radio" name="gender" value="female"> Жіноча
                </td>
            </tr>
            <tr>
                <td align="left"><input type="reset" value="Зареєструватися"></td>
                <td align="right"><input type="reset" value="Очистити"></td>
            </tr>
        </table>
    </form>
</body>
</html>
